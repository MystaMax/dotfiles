# Primer "segmented" layout — used by primer-dark and primer-dimmed.
# Powerline arrows between segments, accent header on the left.
#
# Color/glyph vars (set by the calling theme file):
#   @primer_bg               page background
#   @primer_subtle           inactive segment background
#   @primer_border           thin separator color (between like-bg windows)
#   @primer_fg               default foreground
#   @primer_fg_muted         secondary foreground
#   @primer_accent           accent color (header bg)
#   @primer_active_bg        active window background
#   @primer_active_fg        active window foreground
#   @primer_glyph_user       icon before the user segment
#   @primer_glyph_window     icon before each window in the list
#   @primer_glyph_clock      icon before the time
#   @primer_glyph_calendar   icon before the date
#
# Powerline glyphs used: U+E0B0 (right hard arrow), U+E0B1 (right thin).

# global status bar settings
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-left-length 200
set -g status-right-length 200
set -g status-style "bg=#{@primer_bg},fg=#{@primer_fg}"

# pane border: subtle line, brighter accent on focused pane
set -g pane-border-style "fg=#{@primer_border}"
set -g pane-active-border-style "fg=#{@primer_accent}"

# message line (e.g. command-prompt feedback)
set -g message-style "bg=#{@primer_accent},fg=#{@primer_fg}"
set -g message-command-style "bg=#{@primer_accent},fg=#{@primer_fg}"

# ===== status-left =====
# user segment, then optional ssh-host segment (only when SSH'd in).
# The ssh-host script returns empty string when local; #{?...,...,...}
# checks emptiness and either renders the styled segment or nothing.
%hidden SSH_HOST="#(~/.config/tmux/scripts/ssh-host-segment.sh)"
set -g status-left "\
#[fg=#{@primer_fg},bg=#{@primer_accent},bold] #{E:@primer_glyph_user} #{user} \
#[fg=#{@primer_accent},bg=#{@primer_subtle},nobold]\
#{?#{!=:#{SSH_HOST},},#[fg=#{@primer_fg},bg=#{@primer_subtle}] #{SSH_HOST} #[fg=#{@primer_subtle}#,bg=#{@primer_bg}],#[fg=#{@primer_subtle}#,bg=#{@primer_bg}]}\
"

# ===== status-right =====
set -g status-right "\
#[fg=#{@primer_subtle},bg=#{@primer_bg}]\
#[fg=#{@primer_fg_muted},bg=#{@primer_subtle}] #{E:@primer_glyph_clock} %H:%M \
#[fg=#{@primer_accent},bg=#{@primer_subtle}]\
#[fg=#{@primer_fg},bg=#{@primer_accent},bold] #{E:@primer_glyph_calendar} %Y-%m-%d \
"

# ===== window list =====
# Each window-status-format renders its own leading + trailing arrows.
# Adjacent inactive segments produce a small canvas-bg gap between them
# (visual separation without alternating bg colors). Adjacent inactive
# and active produce a colored arrow transition.
set -g window-status-separator ""

set -g window-status-format "\
#[fg=#{@primer_bg},bg=#{@primer_subtle}]\
#[fg=#{@primer_fg_muted},bg=#{@primer_subtle}] #{E:@primer_glyph_window} #I:#W \
#[fg=#{@primer_subtle},bg=#{@primer_bg}]\
"

set -g window-status-current-format "\
#[fg=#{@primer_bg},bg=#{@primer_active_bg}]\
#[fg=#{@primer_active_fg},bg=#{@primer_active_bg},bold] #{E:@primer_glyph_window} #I:#W \
#[fg=#{@primer_active_bg},bg=#{@primer_bg}]\
"
