# Primer "segmented" layout — used by primer-dark and primer-dimmed.
# Powerline arrows between segments. Inspired by wfxr/tmux-power:
# right side uses LEFT-pointing arrows (U+E0B2) so each segment
# "wedges into" the bar from the right; left side uses RIGHT-pointing
# arrows (U+E0B0). This avoids invisible same-color transitions.
#
# Color/glyph vars (set by the calling theme file):
#   @primer_bg               page background
#   @primer_subtle           visible segment background (use canvas.overlay)
#   @primer_border           thin separator color
#   @primer_fg               default foreground
#   @primer_fg_muted         secondary foreground
#   @primer_accent           accent color (header bg)
#   @primer_active_bg        active window background
#   @primer_active_fg        active window foreground
#   @primer_glyph_user       icon before the user segment
#   @primer_glyph_session    icon before the session name
#   @primer_glyph_window     icon before each window
#   @primer_glyph_clock      icon before the time
#   @primer_glyph_calendar   icon before the date
#   @primer_arrow_right      powerline right hard arrow (U+E0B0)
#   @primer_arrow_left       powerline left hard arrow (U+E0B2)
#   @primer_arrow_thin       powerline right thin arrow (U+E0B1)

set -g status on
set -g status-interval 5
set -g status-position top
set -g status-justify left
set -g status-left-length 200
set -g status-right-length 200
set -g status-style "bg=#{@primer_bg},fg=#{@primer_fg}"

set -g pane-border-style "fg=#{@primer_border}"
set -g pane-active-border-style "fg=#{@primer_accent}"

# Pane title bar above each pane (Zellij-ish framed-pane look).
# Single-pane windows only get the top bar (tmux limitation: borders
# only exist BETWEEN panes, never around a lone pane). Multi-pane
# windows get heavy border lines + arrow indicators on the active edge.
set -g pane-border-status top
set -g pane-border-lines heavy
set -g pane-border-indicators arrows
set -g pane-border-format " #{?pane_active,#[fg=#{@primer_accent}#,bold],#[fg=#{@primer_fg_muted}]}#{?window_zoomed_flag,#{E:@primer_glyph_zoomed} ,}#{?#{!=:#{pane_title},#{host_short}},#{pane_title},#{pane_current_command}}#[default] "

set -g message-style "bg=#{@primer_accent},fg=#{@primer_fg}"
set -g message-command-style "bg=#{@primer_accent},fg=#{@primer_fg}"

# User-segment background changes color when any modal state is active
# (prefix held OR in tab_mode), so you always know "tmux is waiting on
# the next keystroke". Same color for both, since both are short-lived
# and the distinction isn't useful at a glance.
set -g @primer_user_bg "#{?#{||:#{client_prefix},#{==:#{client_key_table},tab_mode}},#{@primer_done},#{@primer_accent}}"

# ===== status-left =====
# [user on accent/attention/done] → [session on subtle] → [host on subtle, SSH only] → canvas
%hidden SSH_HOST="#(~/.config/tmux/scripts/ssh-host-segment.sh)"
set -g status-left "\
#[fg=#{@primer_fg},bg=#{E:@primer_user_bg},bold] #{E:@primer_glyph_user} #{user} \
#[fg=#{E:@primer_user_bg},bg=#{@primer_subtle},nobold]#{E:@primer_arrow_right}\
#[fg=#{@primer_fg},bg=#{@primer_subtle}] #{E:@primer_glyph_session} #S \
#{?#{!=:#{E:SSH_HOST},},#[fg=#{@primer_fg_muted}#,bg=#{@primer_subtle}] #{SSH_HOST} ,}\
#[fg=#{@primer_subtle},bg=#{@primer_bg}]#{E:@primer_arrow_right}\
"

# ===== status-right =====
# canvas → [left-arrow wedge into subtle] [time] → [left-arrow into accent] [date]
set -g status-right "\
#[fg=#{@primer_subtle},bg=#{@primer_bg}]#{E:@primer_arrow_left}\
#[fg=#{@primer_fg_muted},bg=#{@primer_subtle}] #{E:@primer_glyph_clock} %H:%M \
#[fg=#{@primer_accent},bg=#{@primer_subtle}]#{E:@primer_arrow_left}\
#[fg=#{@primer_fg},bg=#{@primer_accent},bold] #{E:@primer_glyph_calendar} %Y-%m-%d \
"

# ===== window list =====
# Each window-status-format renders leading + trailing arrows, with the
# separator set to "" so adjacent segments produce a small canvas-bg gap.
set -g window-status-separator ""

set -g window-status-format "\
#[fg=#{@primer_bg},bg=#{@primer_subtle}]#{E:@primer_arrow_right}\
#[fg=#{@primer_fg_muted},bg=#{@primer_subtle}] #W \
#[fg=#{@primer_subtle},bg=#{@primer_bg}]#{E:@primer_arrow_right}\
"

set -g window-status-current-format "\
#[fg=#{@primer_bg},bg=#{@primer_active_bg}]#{E:@primer_arrow_right}\
#[fg=#{@primer_active_fg},bg=#{@primer_active_bg},bold] #{?window_zoomed_flag,#{E:@primer_glyph_zoomed} ,}#W \
#[fg=#{@primer_active_bg},bg=#{@primer_bg}]#{E:@primer_arrow_right}\
"

# Activity (background window got output) and bell get the attention
# (amber) bg. We paint full segments with explicit fg/bg pairs so the
# powerline arrows on either side don't get inverted/munged (tmux's
# default activity-style uses inverse video and mangles the arrows).
set -g window-status-activity-style "default"
set -g window-status-bell-style "default"
set -g window-status-last-style "default"
set -g window-status-format "\
#{?#{||:#{window_activity_flag},#{window_bell_flag}},\
#[fg=#{@primer_bg}#,bg=#{@primer_attention}]#{E:@primer_arrow_right}#[fg=#{@primer_bg}#,bg=#{@primer_attention}#,bold] #{?window_zoomed_flag,#{E:@primer_glyph_zoomed} ,}#W #[fg=#{@primer_attention}#,bg=#{@primer_bg}]#{E:@primer_arrow_right},\
#[fg=#{@primer_bg}#,bg=#{@primer_subtle}]#{E:@primer_arrow_right}#[fg=#{@primer_fg_muted}#,bg=#{@primer_subtle}] #{?window_zoomed_flag,#{E:@primer_glyph_zoomed} ,}#W #[fg=#{@primer_subtle}#,bg=#{@primer_bg}]#{E:@primer_arrow_right}\
}"
