# Primer "flat" layout — used by primer-flat.
# Web UI feel: all segments share the subtle bg, separated by thin
# vertical bars in the border color. No powerline arrows.

set -g status on
set -g status-interval 5
set -g status-position top
set -g status-justify left
set -g status-left-length 200
set -g status-right-length 200
set -g status-style "bg=#{@primer_subtle},fg=#{@primer_fg}"

set -g pane-border-style "fg=#{@primer_border}"
set -g pane-active-border-style "fg=#{@primer_accent}"

# Same Zellij-ish framed-pane look as _segmented.conf (see comment there).
set -g pane-border-status top
set -g pane-border-lines heavy
set -g pane-border-indicators arrows
set -g pane-border-format " #{?pane_active,#[fg=#{@primer_accent}#,bold],#[fg=#{@primer_fg_muted}]}#{?window_zoomed_flag,#{E:@primer_glyph_zoomed} ,}#{?#{!=:#{pane_title},#{host_short}},#{pane_title},#{pane_current_command}}#[default] "

set -g message-style "bg=#{@primer_accent},fg=#{@primer_fg}"
set -g message-command-style "bg=#{@primer_accent},fg=#{@primer_fg}"

# Tiny indicator block at the very left changes color when any modal
# state is active (prefix held OR in tab_mode), using the same color
# for both since the distinction isn't useful at a glance.
set -g @primer_user_bg "#{?#{||:#{client_prefix},#{==:#{client_key_table},tab_mode}},#{@primer_done},#{@primer_accent}}"

# [accent/attention/done block] [user] | [session] | [host if SSH] | windows | ... | [time] | [date]
%hidden SSH_HOST="#(~/.config/tmux/scripts/ssh-host-segment.sh)"
set -g status-left "\
#[fg=#{@primer_fg},bg=#{E:@primer_user_bg}] \
#[fg=#{@primer_fg},bg=#{@primer_subtle}] #{E:@primer_glyph_user} #{user} \
#[fg=#{@primer_border},bg=#{@primer_subtle}]#{E:@primer_arrow_thin}\
#[fg=#{@primer_fg},bg=#{@primer_subtle}] #{E:@primer_glyph_session} #S \
#{?#{!=:#{E:SSH_HOST},},#[fg=#{@primer_border}]#{E:@primer_arrow_thin}#[fg=#{@primer_fg_muted}#,bg=#{@primer_subtle}] #{SSH_HOST} ,}\
#[fg=#{@primer_border},bg=#{@primer_subtle}]#{E:@primer_arrow_thin}\
"

set -g status-right "\
#[fg=#{@primer_border},bg=#{@primer_subtle}]#{E:@primer_arrow_thin}\
#[fg=#{@primer_fg_muted},bg=#{@primer_subtle}] #{E:@primer_glyph_clock} %H:%M \
#[fg=#{@primer_border},bg=#{@primer_subtle}]#{E:@primer_arrow_thin}\
#[fg=#{@primer_accent},bg=#{@primer_subtle},bold] #{E:@primer_glyph_calendar} %Y-%m-%d \
"

set -g window-status-separator "#[fg=#{@primer_border},bg=#{@primer_subtle}]#{E:@primer_arrow_thin}"

set -g window-status-format "\
#[fg=#{@primer_fg_muted},bg=#{@primer_subtle}] #W \
"

set -g window-status-current-format "\
#[fg=#{@primer_active_bg},bg=#{@primer_subtle},bold] #{?window_zoomed_flag,#{E:@primer_glyph_zoomed} ,}#W \
"

# Activity / bell: amber fg on the same subtle bg (flat layout doesn't
# have powerline arrows to worry about, so just a fg color change).
set -g window-status-activity-style "default"
set -g window-status-bell-style "default"
set -g window-status-last-style "default"
set -g window-status-format "\
#{?#{||:#{window_activity_flag},#{window_bell_flag}},\
#[fg=#{@primer_attention}#,bg=#{@primer_subtle}#,bold] #{?window_zoomed_flag,#{E:@primer_glyph_zoomed} ,}#W ,\
#[fg=#{@primer_fg_muted}#,bg=#{@primer_subtle}] #{?window_zoomed_flag,#{E:@primer_glyph_zoomed} ,}#W \
}"
