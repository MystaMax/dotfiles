# Primer "flat" layout — used by primer-flat.
# Web UI feel: every segment shares the subtle bg, separated by thin
# vertical bars in the border color. No powerline arrows.
#
# Same color/glyph vars as _segmented.conf — see that file for the list.
#
# Powerline thin separator: U+E0B1.

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-left-length 200
set -g status-right-length 200
set -g status-style "bg=#{@primer_subtle},fg=#{@primer_fg}"

set -g pane-border-style "fg=#{@primer_border}"
set -g pane-active-border-style "fg=#{@primer_accent}"

set -g message-style "bg=#{@primer_accent},fg=#{@primer_fg}"
set -g message-command-style "bg=#{@primer_accent},fg=#{@primer_fg}"

# tiny accent block on the very left, then user segment, then optional ssh host
%hidden SSH_HOST="#(~/.config/tmux/scripts/ssh-host-segment.sh)"
set -g status-left "\
#[fg=#{@primer_fg},bg=#{@primer_accent}] \
#[fg=#{@primer_fg},bg=#{@primer_subtle}] #{E:@primer_glyph_user} #{user} \
#{?#{!=:#{SSH_HOST},},#[fg=#{@primer_border}],#[fg=#{@primer_border}]}\
#{?#{!=:#{SSH_HOST},},#[fg=#{@primer_fg},bg=#{@primer_subtle}] #{SSH_HOST} ,}\
#[fg=#{@primer_border},bg=#{@primer_subtle}]\
"

set -g status-right "\
#[fg=#{@primer_border},bg=#{@primer_subtle}]\
#[fg=#{@primer_fg_muted},bg=#{@primer_subtle}] #{E:@primer_glyph_clock} %H:%M \
#[fg=#{@primer_border},bg=#{@primer_subtle}]\
#[fg=#{@primer_accent},bg=#{@primer_subtle}] #{E:@primer_glyph_calendar} %Y-%m-%d \
"

set -g window-status-separator "#[fg=#{@primer_border},bg=#{@primer_subtle}]"

# Inactive: muted fg on subtle bg.
# Active: accent fg, bold, with a small dot marker.
set -g window-status-format "\
#[fg=#{@primer_fg_muted},bg=#{@primer_subtle}] #{E:@primer_glyph_window} #I:#W \
"

set -g window-status-current-format "\
#[fg=#{@primer_active_fg},bg=#{@primer_subtle},bold] #{E:@primer_glyph_window} #I:#W ● \
"
