# Primer Flat — github.com web UI feel.
# All segments share the subtle bg, separated by thin border-color
# vertical bars. No powerline arrows.

# colors (same dark_default palette as primer-dark)
set -g @primer_bg          "#0d1117"
set -g @primer_subtle      "#161b22"
set -g @primer_border      "#30363d"
set -g @primer_fg          "#e6edf3"
set -g @primer_fg_muted    "#7d8590"
set -g @primer_accent      "#2f81f7"
set -g @primer_active_bg   "#3fb950"
set -g @primer_active_fg   "#3fb950"

# glyphs (same as primer-dark)
set -g @primer_glyph_user      ""   # U+F09B  github mark
set -g @primer_glyph_window    ""   # U+F120  terminal (FontAwesome, looks like >_)
set -g @primer_glyph_clock     ""   # U+F017  clock
set -g @primer_glyph_calendar  ""   # U+F133  calendar

source-file ~/.config/tmux/themes/_flat.conf
