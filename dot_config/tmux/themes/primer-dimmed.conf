# Primer Dimmed — github.com dark_dimmed palette.
# Softer / lower contrast than primer-dark; better for long sessions.

# colors
set -g @primer_bg          "#22272e"
set -g @primer_subtle      "#373e47"
set -g @primer_border      "#444c56"
set -g @primer_fg          "#adbac7"
set -g @primer_fg_muted    "#768390"
set -g @primer_accent      "#539bf5"
set -g @primer_active_bg   "#57ab5a"
set -g @primer_active_fg   "#22272e"
set -g @primer_done        "#986ee2"   # tab_mode indicator (purple)
set -g @primer_attention   "#c69026"   # activity/bell indicator (amber, dimmed palette)

# glyphs (same as primer-dark)
set -g @primer_glyph_user      ""   # U+F09B  github mark
set -g @primer_glyph_window    ""   # U+F120  terminal (FontAwesome, looks like >_)
set -g @primer_glyph_clock     ""   # U+F017  clock
set -g @primer_glyph_calendar  ""   # U+F133  calendar
set -g @primer_glyph_zoomed   "⇱"   # U+21F1  arrow to corner (pane zoom indicator)
set -g @primer_glyph_session ""   # U+F114  folder

# powerline separators (U+E0B0 right hard, U+E0B1 right thin)
set -g @primer_arrow_right    ""
set -g @primer_arrow_thin     ""
set -g @primer_arrow_left     ""

source-file ~/.config/tmux/themes/_segmented.conf
