# tmux configuration
# managed by chezmoi (~/.local/share/chezmoi/dot_config/tmux/tmux.conf)

# ===================
# options
# ===================

# true color (Ghostty + most modern terminals support this)
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc,*256col*:Tc,xterm-ghostty:Tc"

set-option -g mouse on

# windows & panes
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g allow-rename off

set-option -g history-limit 100000

# zero esc delay so nvim feels snappy
set-option -sg escape-time 0

# required for nvim FocusGained/Lost autocmds
set-option -g focus-events on

# vi everywhere
set-option -g status-keys vi
set-window-option -g mode-keys vi

# ===================
# keybindings
# ===================

# screen-style prefix
set-option -g prefix C-a
unbind-key C-b
bind-key a send-prefix

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# splits open in the current pane's directory
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# quick reload
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"

# ===================
# plugins
# ===================

set-option -g @plugin 'tmux-plugins/tpm'
set-option -g @plugin 'tmux-plugins/tmux-sensible'
set-option -g @plugin 'tmux-plugins/tmux-resurrect'
set-option -g @plugin 'tmux-plugins/tmux-continuum'
set-option -g @plugin 'wfxr/tmux-power'

# ===================
# plugin config
# ===================

# tmux-resurrect
set-option -g @resurrect-dir '~/.config/tmux/resurrect'
set-option -g @resurrect-capture-pane-contents 'on'
set-option -g @resurrect-strategy-nvim 'session'

# tmux-continuum (auto-restore intentionally disabled)
set-option -g @continuum-save-interval '15'

# tmux-power (theme color: gold|redwine|moon|sky|snow|forest|violet|everforest)
set-option -g @tmux_power_theme 'gold'

# ===================
# sesh
# ===================

# replace default prefix+s session list with sesh picker
# (-tz lists tmux sessions + zoxide directories)
bind-key "s" run-shell "sesh connect \"$(\
  sesh list -tz | fzf-tmux -p 55%,60% \
    --no-sort --border-label ' sesh ' --prompt '⚡  ' \
)\""

# ===================
# tpm init
# ===================

# keep this at the very bottom of the file
if-shell 'test -f ~/.config/tmux/plugins/tpm/tpm' 'run-shell "~/.config/tmux/plugins/tpm/tpm"'
