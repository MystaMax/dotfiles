# tmux configuration
# managed by chezmoi (~/.local/share/chezmoi/dot_config/tmux/tmux.conf)
#
# Goal: tmux as a working backup for Zellij. Functionality > theme.
# Terminology nudge for future-me: tmux's "windows" ~= Zellij's "tabs",
# tmux's "panes" ~= Zellij's "panes". See the zellij-style modes
# section at the bottom for muscle-memory mappings.

# ===================
# options
# ===================

# True color. tmux only advertises 8-color by default, even on terminals
# that support 24-bit. The override flag (Tc) re-enables it. Ghostty
# advertises itself as xterm-ghostty, so it's listed explicitly.
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc,*256col*:Tc,xterm-ghostty:Tc"

# Mouse support: click panes/windows, scroll-wheel history, drag borders.
# Side effect to know about: right-click inside a tmux popup (e.g. the
# sesh picker) opens tmux's hardcoded popup menu. macOS two-finger tap
# counts as right-click; that menu is not configurable in 3.5a. Press
# `q` or Esc to dismiss it; the picker keeps its state.
set-option -g mouse on

# Clipboard relay via OSC 52. Default is `external` (tmux sends OSC 52
# outward when we copy IN tmux, but blocks OSC 52 coming FROM inner
# programs). `on` lets inner programs' OSC 52 sequences pass through
# to the terminal too — needed so that something like Copilot CLI
# running on a remote SSH host can write to your local Mac clipboard:
#   remote app → OSC 52 → SSH → tmux (relay) → Ghostty → macOS clipboard
set-option -g set-clipboard on

# Number windows/panes from 1 (matches what's on the keyboard) and
# renumber on close so we never end up with gaps like 1, 3, 5.
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on

# Don't let processes (vim, ssh, etc.) auto-rename windows behind our back.
set-option -g allow-rename off

# Generous scrollback per window.
set-option -g history-limit 100000

# Default 500ms escape delay makes nvim's <Esc> feel laggy. 0 is fine
# on every terminal that sends multi-byte escape sequences atomically
# (every modern one). -s = server option, applies to all clients.
set-option -sg escape-time 0

# nvim relies on focus events to drive FocusGained/FocusLost autocmds
# (auto-checktime, auto-save plugins, etc.). tmux strips them by default.
set-option -g focus-events on

# vi-style motion in copy mode and the status-line command prompt.
set-option -g status-keys vi
set-window-option -g mode-keys vi

# ===================
# keybindings
# ===================

# Use C-a as the prefix instead of the default C-b. C-b clashes with
# readline's backward-char; C-a is the screen / classic-tmux default
# and is easier on the left hand. C-a a sends a literal C-a through
# (so apps that need the actual C-a still get it).
set-option -g prefix C-a
unbind-key C-b
bind-key a send-prefix

# Vim-style pane focus: prefix h/j/k/l moves left/down/up/right.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Sane split keys: `|` and `-` look like the split they create. The
# tmux defaults `%` and `"` are kept too so muscle memory works either
# way. `-c "#{pane_current_path}"` makes new panes inherit the focused
# pane's directory, matching Zellij's default behaviour. Default tmux
# opens splits in $HOME, which is rarely what we want.
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# prefix N: vanilla "create a new session by name" prompt. This is the
# fallback for hosts without sesh installed (SSH boxes, fresh machines).
# The Zellij-style picker on prefix s (further down) is the daily driver.
bind N command-prompt -p "new session:" "new-session -s '%%'"

# prefix r: reload this file in-place with a confirmation flash so we
# can iterate without restarting the server. Source path is hard-coded
# to the deployed location (chezmoi keeps that in sync with the source).
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"

# ===================
# plugins
# ===================
# Managed by tpm. Install with `prefix + I` after editing this list.
# tpm reads these entries at server startup and clones any missing
# repos into ~/.config/tmux/plugins/ (XDG path; see "tpm init" below).

set-option -g @plugin 'tmux-plugins/tpm'
set-option -g @plugin 'tmux-plugins/tmux-sensible'
set-option -g @plugin 'tmux-plugins/tmux-resurrect'
set-option -g @plugin 'tmux-plugins/tmux-continuum'

# ===================
# plugin config
# ===================

# tmux-resurrect saves a snapshot file (windows, panes, CWDs, optional
# pane contents) that survives reboots and `tmux kill-server`. Manual
# save/restore: prefix + Ctrl-s / prefix + Ctrl-r.
#   - resurrect-dir: keep snapshots under XDG (matches plugins path).
#   - capture-pane-contents: save what's on screen too, not just layout.
#   - strategy-nvim 'session': re-attach to a running nvim's :mksession
#     so files come back open. Requires nvim's mksession to be enabled.
set-option -g @resurrect-dir '~/.config/tmux/resurrect'
set-option -g @resurrect-capture-pane-contents 'on'
set-option -g @resurrect-strategy-nvim 'session'

# tmux-continuum auto-snapshots every 15 min on top of resurrect, so an
# unexpected crash loses at most ~15 min of new windows/panes (CWDs).
# Auto-restore on launch is intentionally OFF: we want a fresh tmux on
# new server starts and to opt in to restore via prefix + Ctrl-r when
# we actually want it. (Zellij behaves similarly.)
set-option -g @continuum-save-interval '15'

# ===================
# theme
# ===================
# Themes are local files under ~/.config/tmux/themes/, sourced from
# here so we don't depend on a third-party plugin (and so chezmoi can
# track them as plain files). To switch: comment the active line and
# uncomment another, then `prefix + r` to reload.
#
# Custom themes: copy a primer-*.conf, change the @primer_* color
# vars, and (optionally) source either _segmented.conf or _flat.conf
# for the layout.

source-file ~/.config/tmux/themes/primer-dark.conf
# source-file ~/.config/tmux/themes/primer-dimmed.conf
# source-file ~/.config/tmux/themes/primer-flat.conf

# ===================
# sesh
# ===================
# sesh = smart session manager (joshmedeski/sesh). Our wrapper
# (sesh-picker.sh) builds a Zellij-style tree of all tmux sessions
# with their windows nested below as indented children. Type to
# filter across both. Picking a window switches to its session AND
# focuses the window. Type a brand-new name + Enter to create.
# In-picker: Ctrl-R rename, Ctrl-D end session/window.
#
# Recommended sesh settings (from the sesh README):
#   detach-on-destroy off keeps tmux attached when we end a session
#     via Ctrl-D in the picker (otherwise tmux exits the client)
#   prefix+L runs `sesh last` instead of tmux's built-in last-session,
#     so closed-session edge cases are handled gracefully
set-option -g detach-on-destroy off

# This rebinds the default `prefix + s` (built-in session list).
bind-key "s" run-shell "~/.config/tmux/sesh-picker.sh"
bind-key "L" run-shell "sesh last"

# ===================
# zellij-style modes
# ===================
# tmux's prefix-then-key model is fine, but Zellij's mode keys are
# baked into muscle memory. This is a hand-rolled "tab mode": one
# global key (Ctrl+T) enters a key table, and a single follow-up key
# fires the action. Original tmux bindings (prefix + c, prefix + n,
# etc.) are untouched.
#
# Why no conflict with the shell's Ctrl+T file picker: tmux's `-n`
# (root table) bindings capture the key BEFORE the inner shell ever
# sees it. So Ctrl+T inside tmux always means "enter tab mode";
# Ctrl+T outside tmux is still the (now-typed-only) fzf file picker.
# If you start a tmux nested inside another tmux, the inner one will
# need its own prefix dance (use `prefix + a` to send literal C-a).
#
# Discoverability: after Ctrl+T, the next key you press fires once
# and you're back to normal mode (no sticky modal state).

# Enter the table.
bind -n C-t switch-client -T tab_mode

# Inside tab_mode:
#   n  new window/tab (Zellij muscle memory)
#   r  rename current window
#   x  close current window (with confirmation)
#   h  previous window
#   l  next window
bind -T tab_mode n new-window
bind -T tab_mode r command-prompt -I "#W" "rename-window '%%'"
bind -T tab_mode x confirm-before -p "kill window? (y/n)" kill-window
bind -T tab_mode h previous-window
bind -T tab_mode l next-window

# ===================
# tpm init
# ===================
# Bootstrap tpm at the very end so plugin code runs after all of the
# options/binds above are in place.
#
# Path note: tpm auto-detects an XDG layout when ~/.config/tmux/tmux.conf
# is the active config and stores plugins at ~/.config/tmux/plugins/
# (NOT ~/.tmux/plugins/). Both this `if-shell` test and @resurrect-dir
# above use the XDG path so the bootstrap actually finds tpm.

if-shell 'test -f ~/.config/tmux/plugins/tpm/tpm' 'run-shell "~/.config/tmux/plugins/tpm/tpm"'
